name: Build and stage

on:
  workflow_dispatch:
    inputs:
      force_publish:
        description: Upload to Play even if no pair changed (app-code-only release)
        type: boolean
        default: false
  schedule:
    # Monthly on the 1st at 04:00 UTC
    - cron: '0 4 1 * *'

env:
  NDK_VERSION: 28.2.13676358
  BUNDLETOOL_VERSION: 1.18.3
  APERTIUM_NATIVE_REPO: rmtheis/translate-native
  PACKAGE_NAME: com.qvyshift.translate

jobs:
  natives:
    name: Cross-compile Apertium stack (${{ matrix.abi }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        abi: [arm64-v8a, armeabi-v7a]
    steps:
      - name: Checkout apertium-native
        uses: actions/checkout@v4
        with:
          repository: ${{ env.APERTIUM_NATIVE_REPO }}
          path: apertium-native
          token: ${{ secrets.APERTIUM_NATIVE_TOKEN }}

      - id: key
        run: |
          sha=$(git -C apertium-native rev-parse HEAD)
          echo "cache_key=natives-${{ matrix.abi }}-${sha}-ndk-${{ env.NDK_VERSION }}" >> $GITHUB_OUTPUT

      - name: Cache native build output
        id: cache
        uses: actions/cache@v4
        with:
          path: apertium-native/out/${{ matrix.abi }}
          key: ${{ steps.key.outputs.cache_key }}

      - if: steps.cache.outputs.cache-hit != 'true'
        name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y autoconf automake libtool pkg-config patchelf \
            ninja-build cmake libxml2-utils xsltproc

      - if: steps.cache.outputs.cache-hit != 'true'
        name: Set up NDK ${{ env.NDK_VERSION }}
        run: |
          yes | sudo $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "ndk;${{ env.NDK_VERSION }}" "cmake;3.22.1"
          echo "NDK=$ANDROID_HOME/ndk/${{ env.NDK_VERSION }}" >> $GITHUB_ENV

      - if: steps.cache.outputs.cache-hit != 'true'
        name: Cross-compile for ${{ matrix.abi }}
        working-directory: apertium-native
        # MAX_JOBS=2 keeps link-heavy steps (ICU, boost, OpenFST, cg3) within the
        # 16 GB ubuntu-latest runner's memory; with unbounded -j the runner OOMs
        # and drops its agent connection ("runner lost communication").
        run: ABI=${{ matrix.abi }} MAX_JOBS=2 ./build.sh all

      - name: Upload native artifacts
        uses: actions/upload-artifact@v4
        with:
          name: natives-${{ matrix.abi }}
          path: apertium-native/out/${{ matrix.abi }}
          retention-days: 7

  pairs:
    name: Prep pair JARs
    runs-on: ubuntu-latest
    outputs:
      pairs_sha: ${{ steps.hash.outputs.inventory }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/checkout@v4
        with:
          repository: ${{ env.APERTIUM_NATIVE_REPO }}
          path: apertium-native
          token: ${{ secrets.APERTIUM_NATIVE_TOKEN }}

      - name: Enumerate enabled pairs
        id: list
        run: |
          ./scripts/list-enabled-pairs.sh > /tmp/pairs.txt
          echo "count=$(wc -l < /tmp/pairs.txt | tr -d ' ')" >> $GITHUB_OUTPUT
          echo "Pairs:" && cat /tmp/pairs.txt

      - name: Cache per-pair JARs by upstream .deb digest
        id: cache
        uses: actions/cache@v4
        with:
          path: pair-jars
          key: pairs-${{ hashFiles('scripts/list-enabled-pairs.sh', 'app/src/main/java/com/qvyshift/translate/PairCatalog.java') }}-${{ github.run_id }}
          restore-keys: |
            pairs-${{ hashFiles('scripts/list-enabled-pairs.sh', 'app/src/main/java/com/qvyshift/translate/PairCatalog.java') }}-
            pairs-

      - name: Prep each pair (only if JAR missing)
        env:
          PAIRS_DIR: ${{ github.workspace }}/pair-jars
        run: |
          mkdir -p pair-jars
          while read pair; do
            jar="pair-jars/apertium-${pair}.jar"
            if [ -f "$jar" ]; then
              echo "have $pair"
              continue
            fi
            bash apertium-native/prep-pair.sh "$pair"
          done < /tmp/pairs.txt

      - name: Compute pair inventory
        id: hash
        run: |
          python3 scripts/pair-inventory.py pair-jars > pair-inventory.json
          echo "inventory=$(sha256sum pair-inventory.json | awk '{print $1}')" >> $GITHUB_OUTPUT

      - name: Upload pair JARs + inventory
        uses: actions/upload-artifact@v4
        with:
          name: pairs
          path: |
            pair-jars
            pair-inventory.json
          retention-days: 7

  build:
    name: Build + test AAB
    runs-on: ubuntu-latest
    needs: [natives, pairs]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin

      - name: Download natives (arm64-v8a)
        uses: actions/download-artifact@v4
        with:
          name: natives-arm64-v8a
          path: natives/arm64-v8a
      - name: Download natives (armeabi-v7a)
        uses: actions/download-artifact@v4
        with:
          name: natives-armeabi-v7a
          path: natives/armeabi-v7a

      - name: Download pair JARs + inventory
        uses: actions/download-artifact@v4
        with:
          name: pairs

      - name: Set up NDK (for install-natives strip pass)
        run: |
          yes | sudo $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "ndk;${{ env.NDK_VERSION }}" \
            "platform-tools" "platforms;android-35" "build-tools;36.0.0"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/${{ env.NDK_VERSION }}" >> $GITHUB_ENV

      - name: Install patchelf (used by scripts/install-natives.sh)
        run: sudo apt-get update && sudo apt-get install -y patchelf

      - name: Populate jniLibs for both ABIs
        # actions/upload-artifact@v4 ships a zip which strips Unix exec bits,
        # so we chmod the NDK-built binaries back to executable before the
        # install script's [ -x ] guard runs.
        run: |
          chmod +x natives/arm64-v8a/bin/* natives/armeabi-v7a/bin/*
          ./scripts/install-natives.sh arm64-v8a natives/arm64-v8a
          ./scripts/install-natives.sh armeabi-v7a natives/armeabi-v7a

      - name: Stage pair JARs into per-pair asset-pack modules
        # The repo's pair_<code>/src/main/assets/ dirs are populated in the working
        # tree, but CI always overwrites them with the freshly-prepped JARs from the
        # pairs job so the release reflects the latest apertium Debian nightly.
        run: ./scripts/stage-pair-packs.sh pair-jars

      - name: Bump versionCode + versionName
        run: |
          # versionCode: yyyymmddHH (hour granularity so multiple builds on the same
          # day don't collide with Play's "versionCode has already been used"
          # rejection; 10 digits stays well under the 2,100,000,000 cap).
          ver=$(date -u +%Y%m%d%H)
          sed -i "s/android:versionCode=\"[0-9]*\"/android:versionCode=\"$ver\"/" app/src/main/AndroidManifest.xml

          # versionName: monotonic x.y.z. Read current, bump patch by 1. The deploy
          # job re-derives the same new value from the checked-out manifest and
          # commits it back on a successful publish, so the next run picks up where
          # this one left off.
          current=$(grep -oE 'android:versionName="[^"]+"' app/src/main/AndroidManifest.xml \
            | head -1 | sed 's/android:versionName="//;s/"//')
          IFS='.' read -r maj min pat <<<"$current"
          new_name="$maj.$min.$((pat + 1))"
          sed -i "s/android:versionName=\"[^\"]*\"/android:versionName=\"$new_name\"/" app/src/main/AndroidManifest.xml
          echo "Built versionCode=$ver versionName=$new_name"

      - name: Decode upload keystore
        env:
          KEYSTORE: ${{ secrets.PLAY_UPLOAD_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE" ]; then
            echo "$KEYSTORE" | base64 -d > app/upload.keystore
          else
            echo "PLAY_UPLOAD_KEYSTORE_BASE64 not set — release will fall back to debug signing"
          fi

      - name: Gradle cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle', 'gradle/wrapper/gradle-wrapper.properties') }}

      - name: Run unit tests
        run: ./gradlew :app:testDebugUnitTest

      - name: Build release AAB
        env:
          UPLOAD_KEYSTORE_PASSWORD: ${{ secrets.UPLOAD_KEYSTORE_PASSWORD }}
          UPLOAD_KEY_ALIAS: ${{ secrets.UPLOAD_KEY_ALIAS }}
          UPLOAD_KEY_PASSWORD: ${{ secrets.UPLOAD_KEY_PASSWORD }}
        run: ./gradlew :app:bundleRelease

      - name: Upload AAB + inventory for deploy step
        uses: actions/upload-artifact@v4
        with:
          name: release-bundle
          path: |
            app/build/outputs/bundle/release/app-release.aab
            pair-inventory.json

  deploy:
    name: Stage to Play
    runs-on: ubuntu-latest
    needs: build
    # Needed so the "snapshot pair inventory" step can push the .ci/ update back
    # to master. GITHUB_TOKEN defaults to read-only on PRs/dispatches.
    permissions:
      contents: write
    # Only deploy when explicitly triggered; the scheduled run produces the AAB but
    # doesn't push it, so humans can review before release. Flip this off for full
    # automation once you're confident.
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: release-bundle

      # upload-artifact@v4 with multiple paths preserves the common-root structure,
      # so the AAB lands at app/build/outputs/bundle/release/. Flatten it so the
      # Play upload action can find app-release.aab at the job's cwd.
      - name: Flatten AAB path
        run: mv app/build/outputs/bundle/release/app-release.aab ./app-release.aab

      - name: Fetch prior pair inventory from repo
        run: cp .ci/prior-pair-inventory.json prior.json 2>/dev/null || echo '[]' > prior.json

      # If no pair was added, removed, or had its sha256 change, there's nothing
      # worth publishing — skip the Play upload, the store-listing splice, and
      # the inventory-snapshot commit. The natives+AAB artifacts stay around for
      # debugging but we don't push them to users. (The "changed" output is read
      # by every subsequent step's `if:` guard.)
      - name: Gate on pair changes
        id: gate
        env:
          FORCE_PUBLISH: ${{ inputs.force_publish }}
        run: |
          python3 - <<'PY'
          import json, os
          prior = {e["pair"]: e for e in json.load(open("prior.json"))}
          current = {e["pair"]: e for e in json.load(open("pair-inventory.json"))}
          added   = sorted(set(current) - set(prior))
          removed = sorted(set(prior) - set(current))
          changed = sorted(p for p in current if p in prior
                           and prior[p].get("sha256") != current[p].get("sha256"))
          forced = os.environ.get("FORCE_PUBLISH") == "true"
          any_change = bool(added or removed or changed) or forced
          print(f"added={len(added)} removed={len(removed)} changed={len(changed)} forced={forced}")
          if changed:
              for p in changed:
                  pv, cv = prior[p].get("version"), current[p].get("version")
                  print(f"  {p}: {pv or '?'} -> {cv or '?'}")
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"changed={'true' if any_change else 'false'}\n")
          PY

      - name: Skip notice
        if: steps.gate.outputs.changed != 'true'
        run: echo "::notice::No pair changed vs last release — not publishing."

      - name: Generate release notes
        if: steps.gate.outputs.changed == 'true'
        # r0adkll/upload-google-play expects files named "whatsnew-<locale>" with
        # NO .txt extension (it reads them as bytes). Naming them *.txt triggers
        # "Unrecognized language code: en-US.txt." because the parser treats the
        # whole filename after "whatsnew-" as the locale.
        run: |
          mkdir -p whatsnew
          python3 scripts/release-notes.py prior.json pair-inventory.json > whatsnew/whatsnew-en-US
          cat whatsnew/whatsnew-en-US

      - name: Generate store listing "Languages" section
        if: steps.gate.outputs.changed == 'true'
        run: python3 scripts/store-listing.py pair-inventory.json > listing-languages.txt

      - name: Upload to Play production
        if: steps.gate.outputs.changed == 'true'
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: ${{ env.PACKAGE_NAME }}
          releaseFiles: app-release.aab
          track: production
          status: completed
          whatsNewDirectory: whatsnew

      # The Play Console full-description isn't updated by r0adkll/upload-google-play;
      # we call the Developer API directly with the generated Languages section.
      - name: Splice Languages section into full description
        if: steps.gate.outputs.changed == 'true'
        env:
          SA_JSON: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
        run: python3 scripts/update-store-description.py listing-languages.txt

      - name: Commit versionName bump + inventory snapshot
        if: steps.gate.outputs.changed == 'true'
        run: |
          # Re-derive the same bump the build job made — deploy checked out master
          # fresh so the manifest still reads the pre-bump versionName.
          current=$(grep -oE 'android:versionName="[^"]+"' app/src/main/AndroidManifest.xml \
            | head -1 | sed 's/android:versionName="//;s/"//')
          IFS='.' read -r maj min pat <<<"$current"
          new_name="$maj.$min.$((pat + 1))"
          sed -i "s/android:versionName=\"[^\"]*\"/android:versionName=\"$new_name\"/" app/src/main/AndroidManifest.xml

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          mkdir -p .ci
          cp pair-inventory.json .ci/prior-pair-inventory.json
          git add .ci/prior-pair-inventory.json app/src/main/AndroidManifest.xml
          git diff --cached --quiet || {
            git commit -m "ci: release $new_name — snapshot pair inventory + bump versionName [skip ci]"
            git push
          }
